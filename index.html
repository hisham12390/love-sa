<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  height:100vh;
  background-size:cover;
  background-position:center;
  overflow:hidden;
  font-family:'Cairo', sans-serif;
  perspective:1000px;
  background-image:url("love1.jpg");
}

.butterfly{
  position:absolute;
  width:80px;
  pointer-events:none;
  transform-style: preserve-3d;
}
</style>
</head>
<body>

<!-- صور الفراشات -->
<img src="butterfly1.png" class="butterfly">
<img src="butterfly2.png" class="butterfly">
<img src="butterfly3.png" class="butterfly">
<img src="butterfly4.png" class="butterfly">
<img src="butterfly5.png" class="butterfly">

<script>
// اختر جميع الفراشات
const butterflyElements = Array.from(document.querySelectorAll(".butterfly"));

// إعداد كل فراشة
const butterflies = butterflyElements.map(el => ({
  el,
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  z: (Math.random() - 0.5) * 500,
  dx: (Math.random() - 0.5) * 2, // سرعة عشوائية ±1
  dy: (Math.random() - 0.5) * 2, // سرعة عشوائية ±1
  dz: (Math.random() - 0.5) * 1, // سرعة Z أقل
  flap: Math.random() * 360,
  flapSpeed: Math.random() * 0.5 + 0.2
}));

function animateButterflies(){
  butterflies.forEach(b=>{
    // تحديث الإحداثيات
    b.x += b.dx;
    b.y += b.dy;
    b.z += b.dz;
    b.flap += b.flapSpeed * 10;

    // انعكاس عند الحواف
    if(b.x < 0 || b.x > window.innerWidth - 80) b.dx *= -1;
    if(b.y < 0 || b.y > window.innerHeight - 80) b.dy *= -1;
    if(b.z < -250 || b.z > 250) b.dz *= -1;

    // حركة جناح متموج
    const wing = Math.sin(b.flap * Math.PI / 180) * 15;

    b.el.style.transform = `translate3d(${b.x}px, ${b.y}px, ${b.z}px) rotateY(${b.flap}deg) rotateX(${wing}deg)`;
  });
  requestAnimationFrame(animateButterflies);
}

// بدء الحركة
animateButterflies();
</script>
</body>
</html>
