<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  font-family:'Cairo', sans-serif;
  overflow:hidden;
  background-image:url("love1.jpg");
  perspective:1000px;
}

.text{
  font-size:38px;
  width:70%;
  text-shadow:2px 2px 10px black;
  margin-bottom:30px;
}

button{
  padding:15px 35px;
  font-size:20px;
  border:none;
  border-radius:30px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  margin:10px;
  position:relative;
  z-index:10;
}

#noBtn{
  background:#e74c3c;
  position:absolute;
}

.butterfly{
  position:absolute;
  width:80px;
  pointer-events:none;
  transform-style:preserve-3d;
}

/* شرارات النجوم */
.spark{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  box-shadow:0 0 10px yellow,0 0 20px white;
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="text" id="message">اهلا صافيه هاي هدية الكي ف أنتِ جاهزة:)؟</div>
<button id="nextBtn">نعم جاهزة ❤️</button>

<!-- صور الفراشات -->
<img src="butterfly1.png" class="butterfly">
<img src="butterfly2.png" class="butterfly">
<img src="butterfly3.png" class="butterfly">
<img src="butterfly4.png" class="butterfly">
<img src="butterfly5.png" class="butterfly">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// ✨ دالة النجوم السحرية
function magicStars(x,y){
  for(let i=0;i<100;i++){ // عدد النجوم
    const star=document.createElement("div");
    star.style.position="absolute";
    star.style.width="6px";
    star.style.height="6px";
    star.style.background="yellow";
    star.style.borderRadius="50%";
    star.style.pointerEvents="none";
    star.style.left=x+"px";
    star.style.top=y+"px";
    star.style.boxShadow="0 0 10px yellow,0 0 20px white";
    document.body.appendChild(star);

    // سرعة واتجاه عشوائي
    const angle = Math.random()*2*Math.PI;
    const speed = Math.random()*0.5 + 0.1; // سرعة أقل
    let dx = Math.cos(angle)*speed;
    let dy = Math.sin(angle)*speed;

    let life=40;

    const move=setInterval(()=>{
      x+=dx;
      y+=dy;
      star.style.left=x+"px";
      star.style.top=y+"px";
      star.style.opacity=life/40;
      life--;
      if(life<=0){
        clearInterval(move);
        star.remove();
      }
    },16);
  }
}

// ---------- النصوص ----------
let scene = 1;
let quote1="الى صاحبة الاعين الخضراء حين نظرتُ إلى عينيكِ الخضراوين، شعرتُ وكأن فراشات الربيع كلها استيقظت في قلبي.";
let quote2="وبليلة العيد، بين الأضواء والفرح، عرفت أن أجمل أعيادي هي تلك التي تكونين فيها بقربي.";

function typeWriter(text){
  let i=0;
  document.getElementById("message").innerHTML="";
  function write(){
    if(i<text.length){
      document.getElementById("message").innerHTML+=text.charAt(i);
      i++;
      setTimeout(write,60);
    }
  }
  write();
}

// ---------- المشاهد ----------
function nextScene(){
  scene++;
  if(scene==2){
    document.body.style.backgroundImage="url('love2.jpg')";
    typeWriter(quote1);
    document.getElementById("nextBtn").innerHTML="التالي ➜";
  }
  else if(scene==3){
    document.body.style.backgroundImage="url('love3.jpg')";
    document.getElementById("message").innerHTML="هل ممكن تكونين أنتِ عيدي؟";
    document.getElementById("nextBtn").style.display="none";
    createButtons();
  }
}

// ---------- أزرار نعم لا ----------
function createButtons(){
  let yes=document.createElement("button");
  yes.innerHTML="نعم ❤️";
  yes.onclick=yesAnswer;

  let no=document.createElement("button");
  no.innerHTML="لا";
  no.id="noBtn";

  document.body.appendChild(yes);
  document.body.appendChild(no);

  no.addEventListener("mouseover",function(){
    let x=Math.random()*window.innerWidth*0.8;
    let y=Math.random()*window.innerHeight*0.8;
    no.style.left=x+"px";
    no.style.top=y+"px";
  });
}

// ---------- نعم الإجابة ----------
function yesAnswer(){
  document.body.style.backgroundImage="url('love4.jpg')";
  typeWriter(quote2);

  let buttons=document.querySelectorAll("button");
  buttons.forEach(btn=>btn.style.display="none");

  fireworks();
}

// ---------- الكونفيتي ----------
function fireworks(){
  var duration=4000;
  var end=Date.now()+duration;
  (function frame(){
    confetti({particleCount:5,angle:60,spread:55,origin:{x:0}});
    confetti({particleCount:5,angle:120,spread:55,origin:{x:1}});
    if(Date.now()<end){
      requestAnimationFrame(frame);
    }
  })();
}

// ---------- حركة الفراشات ----------
const butterflyElements = Array.from(document.querySelectorAll(".butterfly"));
const butterflies = butterflyElements.map(el => ({
    el,
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    z: (Math.random()-0.5)*500,
    dx: (Math.random()-0.5)*2,
    dy: (Math.random()-0.5)*2,
    dz: (Math.random()-0.5)*1,
    flap: Math.random()*360,
    flapSpeed: Math.random()*0.3 + 0.2
}));

function animateButterflies(){
    butterflies.forEach(b=>{
        b.x += b.dx;
        b.y += b.dy;
        b.z += b.dz;
        b.flap += b.flapSpeed*10;

        if(b.x < 0 || b.x > window.innerWidth-80) b.dx *= -1;
        if(b.y < 0 || b.y > window.innerHeight-80) b.dy *= -1;
        if(b.z < -250 || b.z > 250) b.dz *= -1;

        const wing = Math.sin(b.flap*Math.PI/180)*15;
        b.el.style.transform = `translate3d(${b.x}px, ${b.y}px, ${b.z}px) rotateY(${b.flap}deg) rotateX(${wing}deg)`;
    });
    requestAnimationFrame(animateButterflies);
}

animateButterflies();

// ---------- زر البداية ----------
document.getElementById("nextBtn").addEventListener("click",nextScene);

// ---------- كل ضغطة زر تطلق النجوم من مركزه ----------
document.addEventListener("click", function(e){
  if(e.target.tagName === "BUTTON"){
    const rect = e.target.getBoundingClientRect();
    const x = rect.left + rect.width/2;
    const y = rect.top + rect.height/2;
    magicStars(x,y);
  }
});

</script>

</body>
</html>
