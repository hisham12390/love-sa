<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  height:100vh;
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  font-family:'Cairo', sans-serif;
  overflow:hidden;
  background-image:url("love1.jpg");
  perspective: 1000px; 
}

.text{
  font-size:38px;
  width:70%;
  text-shadow:2px 2px 10px black;
  margin-bottom:30px;
}

button{
  padding:15px 35px;
  font-size:20px;
  border:none;
  border-radius:30px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  margin:10px;
  position:relative;
  z-index:10;
}

#noBtn{
  background:#e74c3c;
  position:absolute;
}

.butterfly{
  position: absolute;
  width: 80px;
  pointer-events: none;
  transform-style: preserve-3d;
  transition: transform 0.1s linear;
}
</style>
</head>
<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="text" id="message">هل أنتِ جاهزة؟</div>
<button id="nextBtn">نعم جاهزة ❤️</button>

<!-- صور الفراشات -->
<img src="butterfly1.png" class="butterfly">
<img src="butterfly2.png" class="butterfly">
<img src="butterfly3.png" class="butterfly">
<img src="butterfly4.png" class="butterfly">
<img src="butterfly5.png" class="butterfly">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// ---------- النصوص والأزرار ----------
let scene = 1;
let quote1 = "حين نظرتُ إلى عينيكِ الخضراوين، شعرتُ وكأن فراشات الربيع كلها استيقظت في قلبي.";
let quote2 = "وفي ليلة العيد، بين الأضواء والفرح، أدركت أن أجمل أعيادي هي تلك التي تكونين فيها بقربي.";

function typeWriter(text){
  let i = 0;
  document.getElementById("message").innerHTML="";
  function write(){
    if(i < text.length){
      document.getElementById("message").innerHTML += text.charAt(i);
      i++;
      setTimeout(write,60);
    }
  }
  write();
}

function nextScene(){
  scene++;
  if(scene==2){
    document.body.style.backgroundImage="url('love2.jpg')";
    typeWriter(quote1);
  }
  else if(scene==3){
    document.body.style.backgroundImage="url('love3.jpg')";
    document.getElementById("message").innerHTML="هل مستعدة أن تكوني أنتِ عيدي؟";
    document.getElementById("nextBtn").style.display="none";
    createButtons();
  }
}

// ---------- إنشاء أزرار نعم / لا ----------
function createButtons(){
  let yes=document.createElement("button");
  yes.innerHTML="نعم ❤️";
  yes.onclick=yesAnswer;
  let no=document.createElement("button");
  no.innerHTML="لا";
  no.id="noBtn";
  document.body.appendChild(yes);
  document.body.appendChild(no);

  let yesSize=1;
  let noSize=1;

  no.addEventListener("mouseover",function(){
    let x=Math.random()*window.innerWidth*0.8;
    let y=Math.random()*window.innerHeight*0.8;
    no.style.left=x+"px";
    no.style.top=y+"px";
    yesSize+=0.1;
    noSize-=0.05;
    yes.style.transform="scale("+yesSize+")";
    no.style.transform="scale("+noSize+")";
  });
}

// ---------- نعم الإجابة ----------
function yesAnswer(){
  document.body.style.backgroundImage="url('love4.jpg')";
  typeWriter(quote2);
  let buttons=document.querySelectorAll("button");
  buttons.forEach(btn=>btn.style.display="none");
  celebrateEffect();
}

// ---------- التأثيرات الاحتفالية ----------
function celebrateEffect(){
  // 1️⃣ كونفيتي
  confetti({
    particleCount:50,
    spread:90,
    origin:{x:0.5, y:0.5},
    colors:['#FF3F8E','#04C2C9','#2E55C1','#FFB400']
  });

  // 2️⃣ فقاعات
  for(let i=0;i<20;i++){
    createBubble();
  }

  // 3️⃣ نجوم
  for(let i=0;i<15;i++){
    createStar();
  }

  // 4️⃣ نبض النص
  pulseEffect(document.getElementById("message"));
}

// فقاعات
function createBubble(){
  let bubble=document.createElement('div');
  bubble.style.position='absolute';
  bubble.style.width=bubble.style.height='20px';
  bubble.style.borderRadius='50%';
  bubble.style.background='rgba(255,255,255,0.7)';
  bubble.style.left=Math.random()*window.innerWidth+'px';
  bubble.style.top=window.innerHeight+'px';
  bubble.style.zIndex=5;
  document.body.appendChild(bubble);

  let top=window.innerHeight;
  let id=setInterval(()=>{
    top-=3+Math.random()*2;
    bubble.style.top=top+'px';
    bubble.style.opacity-=0.01;
    if(top<-50){
      clearInterval(id);
      bubble.remove();
    }
  },16);
}

// نجوم
function createStar(){
  let star=document.createElement('div');
  star.style.position='absolute';
  star.style.width=star.style.height='8px';
  star.style.background='yellow';
  star.style.borderRadius='50%';
  star.style.left=Math.random()*window.innerWidth+'px';
  star.style.top=Math.random()*window.innerHeight+'px';
  star.style.opacity=1;
  document.body.appendChild(star);

  let life=50;
  let id=setInterval(()=>{
    star.style.opacity-=0.02;
    life--;
    if(life<=0){
      clearInterval(id);
      star.remove();
    }
  },16);
}

// نبض النص
function pulseEffect(element){
  element.style.transition='transform 0.2s';
  element.style.transform='scale(1.2)';
  setTimeout(()=>element.style.transform='scale(1)',200);
}

// ---------- حركة الفراشات في كل الشاشة ----------
const butterflyElements = Array.from(document.querySelectorAll(".butterfly"));
const butterflies = butterflyElements.map(el => ({
    el,
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    z: (Math.random()-0.5)*500,
    dx: (Math.random()-0.5)*2,
    dy: (Math.random()-0.5)*2,
    dz: (Math.random()-0.5)*1,
    flap: Math.random()*360,
    flapSpeed: Math.random()*0.3 + 0.2
}));

function animateButterflies(){
    butterflies.forEach(b=>{
        b.x += b.dx;
        b.y += b.dy;
        b.z += b.dz;
        b.flap += b.flapSpeed*10;

        // انعكاس عند حدود الشاشة
        if(b.x < 0 || b.x > window.innerWidth-80) b.dx *= -1;
        if(b.y < 0 || b.y > window.innerHeight-80) b.dy *= -1;
        if(b.z < -250 || b.z > 250) b.dz *= -1;

        const wing = Math.sin(b.flap*Math.PI/180)*15;
        b.el.style.transform = `translate3d(${b.x}px, ${b.y}px, ${b.z}px) rotateY(${b.flap}deg) rotateX(${wing}deg)`;
    });
    requestAnimationFrame(animateButterflies);
}

animateButterflies();

// ---------- ربط الزر الرئيسي ----------
document.getElementById("nextBtn").addEventListener("click", ()=>{
  nextScene();
  celebrateEffect(); // تأثير احتفالي عند الضغط على أي زر
});
</script>
</body>
</html>
