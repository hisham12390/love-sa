<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
height:100vh;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-family:'Cairo', sans-serif;
transition:1s;
overflow:hidden;
background-image:url("love1.jpg");
}

.text{
font-size:38px;
width:70%;
text-shadow:2px 2px 10px black;
margin-bottom:30px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:#2ecc71;
color:white;
cursor:pointer;
margin:10px;
}

#noBtn{
background:#e74c3c;
position:absolute;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="text" id="message">هل أنتِ جاهزة؟</div>

<button id="nextBtn" onclick="nextScene()">نعم جاهزة ❤️</button>


<script>

let scene = 1;

let quote1 = "حين نظرتُ إلى عينيكِ الخضراوين، شعرتُ وكأن فراشات الربيع كلها استيقظت في قلبي.";
let quote2 = "وفي ليلة العيد، بين الأضواء والفرح، أدركت أن أجمل أعيادي هي تلك التي تكونين فيها بقربي.";


function typeWriter(text){

let i = 0;
document.getElementById("message").innerHTML="";

function write(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(write,60);
}
}

write();

}


function nextScene(){

scene++;

if(scene==2){

document.body.style.backgroundImage="url('love2.jpg')";
typeWriter(quote1);

}

else if(scene==3){

document.body.style.backgroundImage="url('love3.jpg')";

document.getElementById("message").innerHTML="هل مستعدة أن تكوني أنتِ عيدي؟";

document.getElementById("nextBtn").style.display="none";

createButtons();

}

}


function createButtons(){

let yes=document.createElement("button");
yes.innerHTML="نعم ❤️";
yes.onclick=yesAnswer;

let no=document.createElement("button");
no.innerHTML="لا";
no.id="noBtn";

document.body.appendChild(yes);
document.body.appendChild(no);


let yesSize=1;
let noSize=1;

no.addEventListener("mouseover",function(){

let x=Math.random()*window.innerWidth*0.8;
let y=Math.random()*window.innerHeight*0.8;

no.style.left=x+"px";
no.style.top=y+"px";

yesSize+=0.1;
noSize-=0.05;

yes.style.transform="scale("+yesSize+")";
no.style.transform="scale("+noSize+")";

});

}


function yesAnswer(){

document.body.style.backgroundImage="url('love4.jpg')";

typeWriter(quote2);

fireworks();

}


function fireworks(){

var duration=5000;
var end=Date.now()+duration;

(function frame(){

confetti({
particleCount:6,
angle:60,
spread:55,
origin:{x:0}
});

confetti({
particleCount:6,
angle:120,
spread:55,
origin:{x:1}
});

if(Date.now()<end){
requestAnimationFrame(frame);
}

}());

}

</script>

</body>
</html>

</body>
</html>
